<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>どうぐのなまえクイズ</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #f5f7fa;
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        #app {
            background: white;
            width: 100%;
            max-width: 600px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 25px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* Start Screen */
        #start-screen p {
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Quiz Screen */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .image-container {
            width: 100%;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 250px;
        }

        .image-container img {
            max-width: 100%;
            max-height: 400px;
            display: block;
        }

        .options {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            background: white;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
        }

        .option-btn:hover {
            background: #f0f7ff;
        }

        .option-btn.correct {
            background-color: var(--success-color);
            border-color: var(--success-color);
            color: white;
        }

        .option-btn.wrong {
            background-color: var(--error-color);
            border-color: var(--error-color);
            color: white;
        }

        .feedback {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            height: 1.5em;
        }

        /* Result Screen */
        .result-stats {
            margin: 30px 0;
            font-size: 1.2rem;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .score-big {
            font-size: 3rem;
            color: var(--primary-color);
            margin: 20px 0;
        }

        /* Common Button */
        .main-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
            margin-top: 20px;
        }

        .main-btn:active {
            transform: translateY(2px);
        }

        .main-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        @media (max-width: 480px) {
            #app {
                padding: 15px;
            }
            h1 {
                font-size: 1.2rem;
            }
            .option-btn {
                padding: 12px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<div id="app">
    <h1>どうぐのなまえクイズ</h1>

    <!-- スタート画面 -->
    <div id="start-screen" class="screen active">
        <p>画像を見て、正しい名前を選んでください。<br>全66問からランダムに10問出題されます。</p>
        <button class="main-btn" onclick="startQuiz()">スタート！</button>
    </div>

    <!-- クイズ画面 -->
    <div id="quiz-screen" class="screen">
        <div class="quiz-header">
            <span id="progress">1 / 10</span>
            <span id="score-display">正解: 0</span>
        </div>
        <div class="image-container">
            <img id="quiz-image" src="" alt="クイズ画像">
        </div>
        <div id="options" class="options">
            <!-- ボタンがここに生成される -->
        </div>
        <div id="feedback" class="feedback"></div>
        <button id="next-btn" class="main-btn" onclick="nextQuestion()" style="display: none;">次へ進む</button>
    </div>

    <!-- 結果画面 -->
    <div id="result-screen" class="screen">
        <h2>結果発表</h2>
        <div class="score-big"><span id="final-score">0</span> / <span id="final-total">0</span></div>
        <div class="result-stats">
            <div class="stat-row">
                <span>正解数</span>
                <span id="res-correct">0</span>
            </div>
            <div class="stat-row">
                <span>問題数</span>
                <span id="res-total">0</span>
            </div>
            <div class="stat-row">
                <span>正答率</span>
                <span id="res-rate">0%</span>
            </div>
        </div>
        <p id="sending-msg" style="color: #666; font-size: 0.9rem; margin-bottom: 10px;">結果を送信中...</p>
        <button class="main-btn" onclick="location.reload()">もう一度挑戦</button>
    </div>
</div>

<script>
    // デバイスIDの生成・取得ロジック
    let deviceId = localStorage.getItem('quiz_device_id');
    if (!deviceId) {
        // ランダムなIDを生成（例: Device-abc123xyz）
        deviceId = 'Device-' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('quiz_device_id', deviceId);
    }

    // クイズデータ (全66問)
    const quizData = [
        { image: "img1.png", answer: "クロス" },
        { image: "img2.png", answer: "クッションフロア" },
        { image: "img3.png", answer: "転落防止パイプ" },
        { image: "img4.png", answer: "カーテンレール" },
        { image: "img5.png", answer: "ふさかけ" },
        { image: "img6.png", answer: "ノンスリップ" },
        { image: "img7.png", answer: "への字（床見切り）" },
        { image: "img8.png", answer: "パテ" },
        { image: "img9.png", answer: "糊" },
        { image: "img10.png", answer: "Ｈｉ アップ" },
        { image: "img11.png", answer: "床糊" },
        { image: "img12.png", answer: "機械" },
        { image: "img13.png", answer: "機械（コンピューター）" },
        { image: "img14.png", answer: "パテ練り機" },
        { image: "img15.png", answer: "ゴムバケツ" },
        { image: "img16.png", answer: "撹拌機" },
        { image: "img17.png", answer: "糊バケツ" },
        { image: "img18.png", answer: "丸ノコ" },
        { image: "img19.png", answer: "投光器" },
        { image: "img20.png", answer: "扇風機" },
        { image: "img21.png", answer: "ブロアー" },
        { image: "img22.png", answer: "脚立" },
        { image: "img23.png", answer: "足場" },
        { image: "img24.png", answer: "道板" },
        { image: "img25.png", answer: "ハシゴ" },
        { image: "img26.png", answer: "ヘルメット" },
        { image: "img27.png", answer: "軍手" },
        { image: "img28.png", answer: "腰袋" },
        { image: "img29.png", answer: "ツールバッグ" },
        { image: "img30.png", answer: "上履き" },
        { image: "img31.png", answer: "スリッパ" },
        { image: "img32.png", answer: "ほうき" },
        { image: "img33.png", answer: "ちりとり" },
        { image: "img34.png", answer: "小ぼうき" },
        { image: "img35.png", answer: "左官ブラシ" },
        { image: "img36.png", answer: "インパクトドライバー" },
        { image: "img37.png", answer: "スケール" },
        { image: "img38.png", answer: "シリコンガン" },
        { image: "img39.png", answer: "シリコン" },
        { image: "img40.png", answer: "コーキング" },
        { image: "img41.png", answer: "スポンジ" },
        { image: "img42.png", answer: "カッター" },
        { image: "img43.png", answer: "コーナーカッター" },
        { image: "img44.png", answer: "カッター（フック刃）" },
        { image: "img45.png", answer: "のこぎり" },
        { image: "img46.png", answer: "金槌" },
        { image: "img47.png", answer: "はさみ" },
        { image: "img48.png", answer: "バール" },
        { image: "img49.png", answer: "ガードテープ" },
        { image: "img50.png", answer: "マスキングテープ" },
        { image: "img51.png", answer: "ファイバーテープ" },
        { image: "img52.png", answer: "ジョイントテープ" },
        { image: "img53.png", answer: "下敷きテープ" },
        { image: "img54.png", answer: "コーナーテープ" },
        { image: "img55.png", answer: "パテ板" },
        { image: "img56.png", answer: "パテベラ" },
        { image: "img57.png", answer: "地ベラ" },
        { image: "img58.png", answer: "スクレーパー" },
        { image: "img59.png", answer: "糊ヘラ" },
        { image: "img60.png", answer: "サンダー" },
        { image: "img61.png", answer: "ジョイントローラー" },
        { image: "img62.png", answer: "ひしゃく" },
        { image: "img63.png", answer: "定規" },
        { image: "img64.png", answer: "スコヤ" },
        { image: "img65.png", answer: "ゴムベラ" },
        { image: "img66.png", answer: "スムーサー" }
    ];

    // 設定
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwDOvN_tiBNuEnEd87OuPiuU-8ohFnmDLI5jOBdQx5MaeapM9YZJkyqk0R76mwJdr41/exec"; 
    const IMAGE_PATH = "imgs/"; 
    const QUESTIONS_TO_SHOW = 10; // 出題数

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let isAnswered = false;

    // シャッフル関数
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // クイズ開始
    function startQuiz() {
        // 全データからランダムに指定数抽出
        const shuffledAll = shuffle([...quizData]);
        currentQuestions = shuffledAll.slice(0, QUESTIONS_TO_SHOW);
        
        currentIndex = 0;
        score = 0;
        showScreen('quiz-screen');
        loadQuestion();
    }

    // 画面切り替え
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    // 問題読み込み
    function loadQuestion() {
        isAnswered = false;
        const q = currentQuestions[currentIndex];
        
        // ヘッダー更新
        document.getElementById('progress').textContent = `${currentIndex + 1} / ${currentQuestions.length}`;
        document.getElementById('score-display').textContent = `正解: ${score}`;
        
        // 画像表示
        document.getElementById('quiz-image').src = IMAGE_PATH + q.image;
        
        // 選択肢生成
        const options = generateOptions(q.answer);
        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = '';
        
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.onclick = () => checkAnswer(opt, btn);
            optionsContainer.appendChild(btn);
        });

        document.getElementById('feedback').textContent = '';
        document.getElementById('next-btn').style.display = 'none';
    }

    // 選択肢生成（正解1 + 不正解2）
    function generateOptions(correctAnswer) {
        const allAnswers = quizData.map(d => d.answer);
        const wrongAnswers = allAnswers.filter(a => a !== correctAnswer);
        const uniqueWrong = [...new Set(wrongAnswers)]; // 重複排除
        
        const shuffledWrong = shuffle(uniqueWrong);
        const selectedOptions = [correctAnswer, shuffledWrong[0], shuffledWrong[1]];
        
        return shuffle(selectedOptions);
    }

    // 回答チェック
    function checkAnswer(selected, btn) {
        if (isAnswered) return;
        isAnswered = true;

        const q = currentQuestions[currentIndex];
        const feedback = document.getElementById('feedback');
        const nextBtn = document.getElementById('next-btn');

        if (selected === q.answer) {
            score++;
            btn.classList.add('correct');
            feedback.textContent = '正解！';
            feedback.style.color = 'var(--success-color)';
        } else {
            btn.classList.add('wrong');
            feedback.textContent = `不正解... 正解は「${q.answer}」`;
            feedback.style.color = 'var(--error-color)';
            
            // 正解のボタンをハイライト
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => {
                if (b.textContent === q.answer) {
                    b.classList.add('correct');
                }
            });
        }

        document.getElementById('score-display').textContent = `正解: ${score}`;
        nextBtn.style.display = 'inline-block';
    }

    // 次の問題へ
    function nextQuestion() {
        currentIndex++;
        if (currentIndex < currentQuestions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    // 結果表示
    function showResult() {
        showScreen('result-screen');
        const total = currentQuestions.length;
        const rate = Math.round((score / total) * 100);

        document.getElementById('final-score').textContent = score;
        document.getElementById('final-total').textContent = total;
        document.getElementById('res-correct').textContent = score;
        document.getElementById('res-total').textContent = total;
        document.getElementById('res-rate').textContent = rate + '%';

        sendToGAS(score, total);
    }

    // GAS連携 (安定性向上版)
    async function sendToGAS(score, total) {
        const msg = document.getElementById('sending-msg');
        
        // URLの入力ミスや未設定をチェック
        if (GAS_URL.includes("ここに記載") || GAS_URL.length < 10) {
            msg.textContent = "※GASのURLが設定されていないため、送信をスキップしました。";
            return;
        }

        msg.textContent = "結果をスプレッドシートに送信中...";

        try {
            // タイムアウト設定 (10秒)
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);

            const response = await fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors", // GASのWebアプリは通常CORSを許可しないため
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    correct: score,
                    total: total,
                    deviceId: deviceId, // デバイスIDを送信
                    timestamp: new Date().toISOString()
                }),
                signal: controller.signal
            });

            clearTimeout(timeoutId);
            msg.textContent = "結果をスプレッドシートに送信しました。";
            msg.style.color = "var(--success-color)";
        } catch (err) {
            console.error("GAS送信エラー:", err);
            if (err.name === 'AbortError') {
                msg.textContent = "送信がタイムアウトしました。通信環境を確認してください。";
            } else {
                msg.textContent = "送信に失敗しました。URLの設定や通信環境を確認してください。";
            }
            msg.style.color = "var(--error-color)";
        }
    }
</script>

</body>
</html>
